<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MultiLyrion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="apple-touch-icon" href="icon_mr.png">
    <link rel="icon" type="image/png" href="icon_mr.png">
</head>
<body ontouchstart="">
    <div class="bg-art-blur" id="bg-art-blur"></div>
    <div class="bg-glow"></div>

    <div class="app-container">
        <header class="top-nav">
            <button id="room-select-btn" class="top-nav-btn">
                <span id="current-room-name">Väljer rum...</span>
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
        </header>

        <section class="player-core">
            <div class="artwork-wrapper">
                <img id="album-art" src="icon_mr.png" alt="Album Art">
            </div>
            <div class="track-meta">
                <p id="track-artist">Välj ett rum</p>
                <h1 id="track-title">MultiLyrion</h1>
            </div>
        </section>

        <section class="controls-wrapper">
            <div class="volume-box">
                <div class="vol-info">
                    <span>Volym</span>
                    <span id="vol-percentage">0%</span>
                </div>
                <input type="range" id="volume-slider" min="0" max="100" value="0" class="ios-slider">
            </div>

            <div class="main-transport">
                <button class="btn-secondary" id="prev-btn">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L19 18V6z"/></svg>
                </button>
                <button class="btn-play" id="play-pause-btn">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="btn-secondary" id="next-btn">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </section>

        <footer class="bottom-menu">
            <button class="menu-item" id="random-album-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <circle cx="15.5" cy="15.5" r="1.5"></circle>
                    <circle cx="15.5" cy="8.5" r="1.5"></circle>
                    <circle cx="8.5" cy="15.5" r="1.5"></circle>
                    <circle cx="12" cy="12" r="1.5"></circle>
                </svg>
                <span>Slumpa Album</span>
            </button>
            
            <button class="menu-item" id="tips-album-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>
                <span>Tips på Album</span>
            </button>

            <button class="menu-item" id="daily-mix-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                    <circle cx="8" cy="13" r="2"></circle>
                    <circle cx="16" cy="13" r="2"></circle>
                    <line x1="6" y1="8" x2="18" y2="8"></line>
                </svg>
                <span>Daily Mixes</span>
            </button>
            
            <button class="menu-item" id="open-playlists-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
                <span>Spotify-listor</span>
            </button>
        </footer>
    </div>

    <div id="album-modal" class="modal">
        <div class="modal-glass">
            <div class="modal-handle"></div>
            <h3 class="modal-title">Välj Album</h3>
            <div id="album-grid" class="album-grid-container"></div>
            <button class="close-btn-large" id="close-album-modal">Stäng</button>
        </div>
    </div>

    <div id="playlist-modal" class="modal">
        <div class="modal-glass">
            <div class="modal-handle"></div>
            <h3 class="modal-title">Spotify Listor</h3>
            <div id="playlist-list" class="album-grid-container"></div>
            <button class="close-btn-large" id="close-playlist-modal">Stäng</button>
        </div>
    </div>

    <div id="daily-modal" class="modal">
        <div class="modal-glass">
            <div class="modal-handle"></div>
            <h3 class="modal-title">Dina Daily Mixes</h3>
            <div id="daily-grid" class="album-grid-container"></div>
            <button class="close-btn-large">Stäng</button>
        </div>
    </div>
    
    <div id="room-modal" class="modal">
        <div class="modal-glass">
            <div class="modal-handle"></div>
            <h3 class="modal-title">Välj Spelare</h3>
            <div class="room-list"></div>
            <button class="close-btn-large" id="close-room-modal">Stäng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
